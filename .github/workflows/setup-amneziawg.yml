name: Build amneziawg-kmod source archive

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
          contents: write 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
    
      - name: Preparing environment
        run: |
          sudo apt-get update
          sudo apt-get install quilt dpkg-dev xz-utils osc -y
    
      - name: Parse version and release
        id: version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          UPSTREAM=${TAG%-*}
          RELEASE=${TAG##*-}
          UPSTREAM_TOOLS=1.0.20260223
          echo "upstream=$UPSTREAM" >> $GITHUB_OUTPUT
          echo "upstream_tools=$UPSTREAM_TOOLS" >> $GITHUB_OUTPUT
          echo "release=$RELEASE" >> $GITHUB_OUTPUT

      - name: Generate and commit changelogs
        env:
          UPSTREAM: ${{ steps.version.outputs.upstream }}
          UPSTREAM_TOOLS: ${{ steps.version.outputs.upstream_tools }}
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          bash gen_changelog.sh \
            "${UPSTREAM}" "${UPSTREAM_TOOLS}" \
            "Oleg YroriXW" "olegyrori@gmail.com"

          sed -i "s/^Version:.*/Version: ${UPSTREAM}/" amneziawg-kmod.spec
          sed -i "s/^Release:.*/Release: ${RELEASE}%{?dist}/" amneziawg-kmod.spec
          sed -i "s/^Version:.*/Version: ${UPSTREAM}/" amneziawg.spec
          sed -i "s/^Release:.*/Release: ${RELEASE}%{?dist}/" amneziawg.spec
          sed -i "s/^Version:.*/Version: ${UPSTREAM_TOOLS}/" amneziawg-tools.spec
          sed -i "s/^Release:.*/Release: ${RELEASE}%{?dist}/" amneziawg-tools.spec
          sed -i "s|/download/v[^/]*/amneziawg-tools|/download/v${UPSTREAM}-%{release}/amneziawg-tools|" amneziawg-tools.spec
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG debian/changelog debian_awgtools/changelog \
                  amneziawg-kmod.spec amneziawg-tools.spec amneziawg.spec
          git diff --cached --quiet || git commit -m "chore: update changelogs for v${UPSTREAM}-${RELEASE}"
          git push origin HEAD:main

      - name: Download upstream source
        run: |
          wget -O source.tar.gz \
            "https://github.com/amnezia-vpn/amneziawg-linux-kernel-module/archive/refs/tags/v${{ steps.version.outputs.upstream }}.tar.gz"
          wget -O source-tools.tar.gz \
            "https://github.com/amnezia-vpn/amneziawg-tools/archive/refs/tags/v${{ steps.version.outputs.upstream_tools }}.tar.gz"

      - name: Extract and repack
        run: |
          tar -xzf source.tar.gz
          tar -xzf source-tools.tar.gz
          rm -rf amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/debian
          rm -rf amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/debian

          cd amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/src
          rm -rf dkms.conf
          cat > dkms.conf << EOF
          PACKAGE_NAME="amneziawg"
          PACKAGE_VERSION="${{ steps.version.outputs.upstream }}"
          AUTOINSTALL=yes
          
          BUILT_MODULE_NAME="amneziawg"
          DEST_MODULE_LOCATION="/kernel/drivers/net/amneziawg"
          PRE_BUILD="pre-build.sh"
          EOF
          cd ../../

          
          cp -r blake2sintegrationMakefile.patch fixmemleakinjpspecsetup.patch fixversionkernel.patch debian/patches
          cp -r debian amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/
          cd amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }} && export QUILT_PATCHES=debian/patches && quilt push -a && rm -rf .pc && cd ../

          mkdir -p amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}/patches
          rm -rf amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/debian/patches       
          cp -r amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/src/* amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}/COPYING pre-build.sh amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}/
          cp -r blake2s.patch amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}/patches/
          tar -czvf amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}
          cp -r amneziawg-linux-kmod_${{ steps.version.outputs.upstream }} amneziawg-kmod
          tar -czvf amneziawg-kmod.tar.gz amneziawg-kmod
          cd amneziawg-linux-kernel-module-${{ steps.version.outputs.upstream }}
          tar -czvf amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz debian
          mv amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz ../
          cd ../

          cp -r fixversiontools.patch debian_awgtools/patches/
          cp -r debian_awgtools amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/debian
          cd amneziawg-tools-${{ steps.version.outputs.upstream_tools }} && export QUILT_PATCHES=debian/patches && quilt push -a && rm -rf .pc && cd ../
          
          mkdir amneziawg_${{ steps.version.outputs.upstream_tools }}
          rm -rf amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/debian/patches       
          cp -r amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/src amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/contrib amneziawg-tools-${{ steps.version.outputs.upstream_tools }}/COPYING amneziawg_${{ steps.version.outputs.upstream_tools }}/
          tar -czvf amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz amneziawg_${{ steps.version.outputs.upstream_tools }}
          cp -r amneziawg_${{ steps.version.outputs.upstream_tools }} amneziawg-tools-${{ steps.version.outputs.upstream_tools }}
          tar -czvf amneziawg-tools.tar.gz amneziawg-tools-${{ steps.version.outputs.upstream_tools }}
          cd amneziawg-tools-${{ steps.version.outputs.upstream_tools }}
          tar -czvf amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz debian
          mv amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz ../
          cd ../

          MD5orig=$(md5sum amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz | cut -d ' ' -f1)
          MD5debian=$(md5sum amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz | cut -d ' ' -f1)
          SHA256orig=$(sha256sum amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz | cut -d ' ' -f1)
          SHA256debian=$(sha256sum amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz | cut -d ' ' -f1)
          SIZEorig=$(wc -c < amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz)
          SIZEdebian=$(wc -c < amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz)

          cat > amneziawg-kmod.dsc << EOF
          Format: 3.0 (quilt)
          Source: amneziawg-linux-kmod
          Binary: amneziawg-dkms
          Version: ${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}
          Maintainer: Oleg YroriXW <olegyrori@gmail.com>
          Architecture: all
          Vcs-Git: https://github.com/YroriXW/amneziawg.git
          Vcs-Browser: https://github.com/YroriXW/amneziawg
          Build-Depends: debhelper-compat (= 13)
          Build-Depends-Indep: dh-dkms | dkms (<< 3.0.10)
          Standards-Version: 4.7.2
          Package-List:
            amneziawg-dkms deb kernel optional arch=all    
          Homepage: https://amnezia.org
          Files:
           ${MD5orig} ${SIZEorig} amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz
           ${MD5debian} ${SIZEdebian} amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz
          Checksums-Sha256:
           ${SHA256orig} ${SIZEorig} amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz
           ${SHA256debian} ${SIZEdebian} amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz
          EOF

          MD5orig=$(md5sum amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz | cut -d ' ' -f1)
          MD5debian=$(md5sum amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz | cut -d ' ' -f1)
          SHA256orig=$(sha256sum amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz | cut -d ' ' -f1)
          SHA256debian=$(sha256sum amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz | cut -d ' ' -f1)
          SIZEorig=$(wc -c < amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz)
          SIZEdebian=$(wc -c < amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz)

          cat > amneziawg.dsc << EOF
          Format: 3.0 (quilt)
          Source: amneziawg
          Binary: amneziawg
          Version: ${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}
          Maintainer: Oleg YroriXW <olegyrori@gmail.com>
          Architecture: all
          Vcs-Git: https://github.com/YroriXW/amneziawg.git
          Vcs-Browser: https://github.com/YroriXW/amneziawg
          Build-Depends: debhelper-compat (= 13), pkg-config, systemd
          Standards-Version: 4.7.2
          Package-List:
            amneziawg deb net optional arch=all
          Homepage: https://amnezia.org
          Files:
           ${MD5orig} ${SIZEorig} amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz
           ${MD5debian} ${SIZEdebian} amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz
          Checksums-Sha256:
           ${SHA256orig} ${SIZEorig} amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz
           ${SHA256debian} ${SIZEdebian} amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz
          EOF

          cat > amneziawg-tools.dsc << EOF
          Format: 3.0 (quilt)
          Source: amneziawg
          Binary: amneziawg-tools
          Version: ${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}
          Maintainer: Oleg YroriXW <olegyrori@gmail.com>
          Architecture: all
          Vcs-Git: https://github.com/YroriXW/amneziawg.git
          Vcs-Browser: https://github.com/YroriXW/amneziawg
          Build-Depends: debhelper-compat (= 13), pkg-config, systemd
          Standards-Version: 4.7.2
          Package-List:
            amneziawg-tools deb net optional arch=all
          Homepage: https://amnezia.org          
          Files:
           ${MD5orig} ${SIZEorig} amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz
           ${MD5debian} ${SIZEdebian} amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz
          Checksums-Sha256:
           ${SHA256orig} ${SIZEorig} amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz
           ${SHA256debian} ${SIZEdebian} amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz
          EOF

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}.orig.tar.gz
            amneziawg-linux-kmod_${{ steps.version.outputs.upstream }}-${{ steps.version.outputs.release }}.debian.tar.gz
            amneziawg_${{ steps.version.outputs.upstream_tools }}.orig.tar.gz
            amneziawg_${{ steps.version.outputs.upstream_tools }}-${{ steps.version.outputs.release }}.debian.tar.gz
            amneziawg-kmod.tar.gz
            amneziawg-tools.tar.gz
            amneziawg-kmod.dsc
            amneziawg-tools.dsc
            amneziawg.dsc
            amneziawg-kmod.spec
            amneziawg-tools.spec
            amneziawg.spec

      - name: Update OBS _service via osc
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
          OBS_PROJECT: ${{ secrets.OBS_PROJECT }}
          OBS_PACKAGE: ${{ secrets.OBS_PACKAGE }}
          UPSTREAM: ${{ steps.version.outputs.upstream }}
          UPSTREAM_TOOLS: ${{ steps.version.outputs.upstream_tools }}
          RELEASE: ${{ steps.version.outputs.release }}
        run: |
          mkdir -p ~/.config/osc
          cat > ~/.config/osc/oscrc << EOF
          [general]
          apiurl = https://api.opensuse.org

          [https://api.opensuse.org]
          user = ${OBS_USERNAME}
          pass = ${OBS_PASSWORD}
          EOF

          SHA_KMOD_TAR=$(sha256sum amneziawg-kmod.tar.gz | cut -d ' ' -f1)
          SHA_KMOD_DSC=$(sha256sum amneziawg-kmod.dsc | cut -d ' ' -f1)
          SHA_TOOLS_TAR=$(sha256sum amneziawg-tools.tar.gz | cut -d ' ' -f1)
          SHA_TOOLS_DSC=$(sha256sum amneziawg-tools.dsc | cut -d ' ' -f1)
          SHA_AWG_DSC=$(sha256sum amneziawg.dsc | cut -d ' ' -f1)
          SHA_AWG_SPEC=$(sha256sum amneziawg.spec | cut -d ' ' -f1)
          SHA_KMOD_SPEC=$(sha256sum amneziawg-kmod.spec | cut -d ' ' -f1)
          SHA_TOOLS_SPEC=$(sha256sum amneziawg-tools.spec | cut -d ' ' -f1)
          SHA_KMOD_ORIG=$(sha256sum amneziawg-linux-kmod_${UPSTREAM}.orig.tar.gz | cut -d ' ' -f1)
          SHA_KMOD_DEB=$(sha256sum amneziawg-linux-kmod_${UPSTREAM}-${RELEASE}.debian.tar.gz | cut -d ' ' -f1)
          SHA_AWG_ORIG=$(sha256sum amneziawg_${UPSTREAM_TOOLS}.orig.tar.gz | cut -d ' ' -f1)
          SHA_AWG_DEB=$(sha256sum amneziawg_${UPSTREAM_TOOLS}-${RELEASE}.debian.tar.gz | cut -d ' ' -f1)

          osc co ${OBS_PROJECT} ${OBS_PACKAGE}
          cd ${OBS_PROJECT}/${OBS_PACKAGE}

          cat > _service << EOF
          <services>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-kmod.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-kmod.dsc</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-tools.dsc</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-tools.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg.dsc</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-linux-kmod_${UPSTREAM}.orig.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-linux-kmod_${UPSTREAM}-${RELEASE}.debian.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg_${UPSTREAM_TOOLS}.orig.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg_${UPSTREAM_TOOLS}-${RELEASE}.debian.tar.gz</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg.spec</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-kmod.spec</param>
            </service>
            <service name="download_url">
              <param name="protocol">https</param>
              <param name="host">github.com</param>
              <param name="path">/YroriXW/amneziawg/releases/latest/download/amneziawg-tools.spec</param>
            </service>

            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-kmod.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_KMOD_TAR}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-kmod.dsc</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_KMOD_DSC}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-linux-kmod_${UPSTREAM}-${RELEASE}.debian.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_KMOD_DEB}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-linux-kmod_${UPSTREAM}.orig.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_KMOD_ORIG}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-tools.dsc</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_TOOLS_DSC}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-tools.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_TOOLS_TAR}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg.dsc</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_AWG_DSC}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg_${UPSTREAM_TOOLS}-${RELEASE}.debian.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_AWG_DEB}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg_${UPSTREAM_TOOLS}.orig.tar.gz</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_AWG_ORIG}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg.spec</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_AWG_SPEC}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-kmod.spec</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_KMOD_SPEC}</param>
            </service>
            <service name="verify_file">
              <param name="file">_service:download_url:amneziawg-tools.spec</param>
              <param name="verifier">sha256</param>
              <param name="checksum">${SHA_TOOLS_SPEC}</param>
            </service>
          </services>
          EOF
          osc ci -m "CI update: v${UPSTREAM}-${RELEASE}"
          osc rebuild ${OBS_PROJECT} ${OBS_PACKAGE} && osc rebuild ${OBS_PROJECT} ${OBS_PACKAGE} -M ${OBS_PACKAGE}-kmod && osc rebuild ${OBS_PROJECT} ${OBS_PACKAGE} -M ${OBS_PACKAGE}-tools
